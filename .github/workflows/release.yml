name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v. Defaults to gradle.properties."
        required: false
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: true
        default: false
        type: boolean
      publish_maven_central:
        description: "Publish artifacts to Maven Central."
        required: true
        default: true
        type: boolean
      publish_github_packages:
        description: "Publish artifacts to the GitHub Packages mirror."
        required: true
        default: true
        type: boolean
      create_github_release:
        description: "Create or refresh the GitHub release."
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish Packages And Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: false

      - name: Resolve release
        id: release
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(grep '^latticeVersion=' gradle.properties | cut -d= -f2)"
          fi

          prerelease="false"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            prerelease="${{ inputs.prerelease }}"
          else
            version_lower="${version,,}"
            if [[ "${version_lower}" =~ -(alpha|beta|rc|snapshot|dev)([._-]?[0-9a-z]+)*$ ]]; then
              prerelease="true"
            fi
          fi
          [[ "${prerelease}" == "true" ]] || prerelease="false"

          publish_maven_central="true"
          publish_github_packages="true"
          create_github_release="true"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            publish_maven_central="${{ inputs.publish_maven_central }}"
            publish_github_packages="${{ inputs.publish_github_packages }}"
            create_github_release="${{ inputs.create_github_release }}"
          fi
          [[ "${publish_maven_central}" == "true" ]] || publish_maven_central="false"
          [[ "${publish_github_packages}" == "true" ]] || publish_github_packages="false"
          [[ "${create_github_release}" == "true" ]] || create_github_release="false"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "publish_maven_central=${publish_maven_central}" >> "${GITHUB_OUTPUT}"
          echo "publish_github_packages=${publish_github_packages}" >> "${GITHUB_OUTPUT}"
          echo "create_github_release=${create_github_release}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release ref
        id: release_ref
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          tag_exists="false"
          tag_commit=""

          if ! git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "::error::Unable to fetch release tag ${TAG}."
              exit 1
            fi
            echo "::notice::Release tag ${TAG} was not found; using the current checkout."
          fi

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            tag_exists="true"
            git checkout --detach "refs/tags/${TAG}"
            tag_commit="$(git rev-parse "${TAG}^{commit}")"
          fi

          commit="$(git rev-parse HEAD)"
          if [[ "${tag_exists}" == "true" && "${commit}" != "${tag_commit}" ]]; then
            echo "::error::Release checkout ${commit} does not match ${TAG} (${tag_commit})."
            exit 1
          fi

          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"
          echo "tag_exists=${tag_exists}" >> "${GITHUB_OUTPUT}"
          echo "tag_commit=${tag_commit}" >> "${GITHUB_OUTPUT}"

      - name: Verify release version
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          project_version="$(grep '^latticeVersion=' gradle.properties | cut -d= -f2)"
          if [[ "${project_version}" != "${VERSION}" ]]; then
            echo "::error::Release version ${VERSION} does not match gradle.properties (${project_version})."
            exit 1
          fi

      - name: Prepare release notes
        if: steps.release.outputs.create_github_release == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          mkdir -p build/release
          notes_file="docs/release-notes/${VERSION}.md"
          if [[ ! -f "${notes_file}" ]]; then
            echo "::error::Missing release notes: ${notes_file}"
            exit 1
          fi

          cp "${notes_file}" build/release/notes.base.md

      - name: Build
        run: ./gradlew --no-daemon -PlatticeVersion=${{ steps.release.outputs.version }} build :lattice-paper:standaloneJar

      - name: Check Maven Central credentials
        if: steps.release.outputs.publish_maven_central == 'true'
        shell: bash
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_IN_MEMORY_KEY_PASSWORD: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          missing=()
          [[ -n "${MAVEN_CENTRAL_USERNAME}" ]] || missing+=("MAVEN_CENTRAL_USERNAME")
          [[ -n "${MAVEN_CENTRAL_PASSWORD}" ]] || missing+=("MAVEN_CENTRAL_PASSWORD")
          [[ -n "${SIGNING_IN_MEMORY_KEY}" ]] || missing+=("SIGNING_IN_MEMORY_KEY")
          [[ -n "${SIGNING_IN_MEMORY_KEY_PASSWORD}" ]] || missing+=("SIGNING_IN_MEMORY_KEY_PASSWORD")

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing Maven Central release secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Publish to Maven Central
        id: maven_central
        if: steps.release.outputs.publish_maven_central == 'true'
        shell: bash
        run: |
          mkdir -p build/release
          log_file="build/release/maven-central-publish.log"
          known_timeout_message="Deployment validation timed out after 900s. Last known state: PUBLISHING"

          set +e
          ./gradlew --no-daemon -PlatticeVersion=${{ steps.release.outputs.version }} publishAndReleaseToMavenCentral 2>&1 | tee "${log_file}"
          gradle_status=${PIPESTATUS[0]}
          set -e

          if [[ "${gradle_status}" -eq 0 ]]; then
            echo "status=success" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if grep -Fq -- "${known_timeout_message}" "${log_file}"; then
            echo "::warning::${known_timeout_message}; continuing with Maven Central status publishing_timeout."
            echo "status=publishing_timeout" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "status=failed" >> "${GITHUB_OUTPUT}"
          exit "${gradle_status}"
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}

      - name: Publish to GitHub Packages mirror
        id: github_packages
        if: >-
          steps.release.outputs.publish_github_packages == 'true' &&
          (
            steps.release.outputs.publish_maven_central == 'false' ||
            steps.maven_central.outputs.status == 'success' ||
            steps.maven_central.outputs.status == 'publishing_timeout'
          )
        shell: bash
        run: |
          ./gradlew --no-daemon -PlatticeVersion=${{ steps.release.outputs.version }} publishGitHubPackagesMirror
          echo "status=success" >> "${GITHUB_OUTPUT}"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Finalize release notes
        if: steps.release.outputs.create_github_release == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
          GITHUB_PACKAGES_STATUS: ${{ steps.github_packages.outputs.status }}
          MAVEN_CENTRAL_STATUS: ${{ steps.maven_central.outputs.status }}
          PUBLISH_MAVEN_CENTRAL: ${{ steps.release.outputs.publish_maven_central }}
        run: |
          cp build/release/notes.base.md build/release/notes.md
          cat >> build/release/notes.md <<NOTES

          ## Artifacts

          NOTES

          if [[ "${PUBLISH_MAVEN_CENTRAL}" == "false" ]]; then
            cat >> build/release/notes.md <<NOTES
          - Maven Central: not published in this workflow run; verify the \`io.github.hydr46605\` ${VERSION} coordinates before use
          NOTES
          elif [[ "${MAVEN_CENTRAL_STATUS}" == "publishing_timeout" ]]; then
            cat >> build/release/notes.md <<NOTES
          - Maven Central: publishing is still finalizing; \`io.github.hydr46605\` ${VERSION} coordinates may not resolve immediately
          NOTES
          else
            cat >> build/release/notes.md <<NOTES
          - Maven Central: \`io.github.hydr46605:lattice-api:${VERSION}\`
          - Maven Central: \`io.github.hydr46605:lattice-core:${VERSION}\`
          - Maven Central: \`io.github.hydr46605:lattice-paper:${VERSION}\`
          NOTES
          fi

          if [[ "${GITHUB_PACKAGES_STATUS}" == "success" ]]; then
            cat >> build/release/notes.md <<NOTES
          - GitHub Packages mirror: \`dev.beryl:lattice-api:${VERSION}\`, \`dev.beryl:lattice-core:${VERSION}\`, \`dev.beryl:lattice-paper:${VERSION}\`
          NOTES
          fi

          cat >> build/release/notes.md <<NOTES
          - Standalone Paper/Folia jar attached to this release
          NOTES

      - name: Create GitHub release
        if: >-
          steps.release.outputs.create_github_release == 'true' &&
          (
            steps.release.outputs.publish_maven_central == 'false' ||
            steps.maven_central.outputs.status == 'success' ||
            steps.maven_central.outputs.status == 'publishing_timeout'
          )
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
          RELEASE_COMMIT: ${{ steps.release_ref.outputs.commit }}
          TAG_EXISTS: ${{ steps.release_ref.outputs.tag_exists }}
          TAG_COMMIT: ${{ steps.release_ref.outputs.tag_commit }}
        run: |
          artifacts=(
            "lattice-api/build/libs/lattice-api-${VERSION}.jar"
            "lattice-api/build/libs/lattice-api-${VERSION}-sources.jar"
            "lattice-api/build/libs/lattice-api-${VERSION}-javadoc.jar"
            "lattice-core/build/libs/lattice-core-${VERSION}.jar"
            "lattice-core/build/libs/lattice-core-${VERSION}-sources.jar"
            "lattice-core/build/libs/lattice-core-${VERSION}-javadoc.jar"
            "lattice-paper/build/libs/lattice-paper-${VERSION}.jar"
            "lattice-paper/build/libs/lattice-paper-${VERSION}-sources.jar"
            "lattice-paper/build/libs/lattice-paper-${VERSION}-javadoc.jar"
            "lattice-paper/build/libs/lattice-paper-${VERSION}-standalone.jar"
          )

          create_flags=(--latest)
          if [[ "${PRERELEASE}" == "true" ]]; then
            create_flags=(--prerelease --latest=false)
          fi

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            if [[ "${TAG_EXISTS}" != "true" ]]; then
              echo "::error::GitHub Release ${TAG} exists, but the matching git tag was not found locally."
              exit 1
            fi
            if [[ "${TAG_COMMIT}" != "${RELEASE_COMMIT}" ]]; then
              echo "::error::Refusing to upload assets built from ${RELEASE_COMMIT}; ${TAG} points at ${TAG_COMMIT}."
              exit 1
            fi
            release_id="$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json databaseId --jq '.databaseId')"
            python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          prerelease = os.environ["PRERELEASE"] == "true"
          payload = {
              "name": f"Lattice {os.environ['VERSION']}",
              "body": Path("build/release/notes.md").read_text(encoding="utf-8"),
              "target_commitish": os.environ["RELEASE_COMMIT"],
              "prerelease": prerelease,
              "make_latest": "false" if prerelease else "true",
          }
          Path("build/release/update-release.json").write_text(
              json.dumps(payload),
              encoding="utf-8",
          )
          PY
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              --input build/release/update-release.json >/dev/null
            gh release upload "${TAG}" "${artifacts[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG}" "${artifacts[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${RELEASE_COMMIT}" \
              --title "Lattice ${VERSION}" \
              --notes-file build/release/notes.md \
              "${create_flags[@]}"
          fi

name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v. Defaults to gradle.properties."
        required: false
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish Packages And Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: false

      - name: Resolve release
        id: release
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(grep '^latticeVersion=' gradle.properties | cut -d= -f2)"
          fi

          project_version="$(grep '^latticeVersion=' gradle.properties | cut -d= -f2)"
          if [[ "${project_version}" != "${version}" ]]; then
            echo "::error::Release version ${version} does not match gradle.properties (${project_version})."
            exit 1
          fi

          prerelease="false"
          if [[ "${{ inputs.prerelease }}" == "true" || "${version}" == 0.* ]]; then
            prerelease="true"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Build
        run: ./gradlew --no-daemon -PlatticeVersion=${{ steps.release.outputs.version }} build :lattice-paper:standaloneJar

      - name: Check Maven Central credentials
        shell: bash
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_IN_MEMORY_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_IN_MEMORY_KEY_PASSWORD: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          missing=()
          [[ -n "${MAVEN_CENTRAL_USERNAME}" ]] || missing+=("MAVEN_CENTRAL_USERNAME")
          [[ -n "${MAVEN_CENTRAL_PASSWORD}" ]] || missing+=("MAVEN_CENTRAL_PASSWORD")
          [[ -n "${SIGNING_IN_MEMORY_KEY}" ]] || missing+=("SIGNING_IN_MEMORY_KEY")
          [[ -n "${SIGNING_IN_MEMORY_KEY_PASSWORD}" ]] || missing+=("SIGNING_IN_MEMORY_KEY_PASSWORD")

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing Maven Central release secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Publish to Maven Central
        run: ./gradlew --no-daemon -PlatticeVersion=${{ steps.release.outputs.version }} publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}

      - name: Publish to GitHub Packages mirror
        run: ./gradlew --no-daemon -PlatticeVersion=${{ steps.release.outputs.version }} publishAllPublicationsToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Write release notes
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          mkdir -p build/release
          notes_file="docs/release-notes/${VERSION}.md"
          if [[ ! -f "${notes_file}" ]]; then
            echo "::error::Missing release notes: ${notes_file}"
            exit 1
          fi

          cp "${notes_file}" build/release/notes.md
          cat >> build/release/notes.md <<NOTES

          ## Artifacts

          - Maven Central: \`dev.beryl:lattice-api:${VERSION}\`
          - Maven Central: \`dev.beryl:lattice-core:${VERSION}\`
          - Maven Central: \`dev.beryl:lattice-paper:${VERSION}\`
          - GitHub Packages mirror: same Maven coordinates
          - Standalone Paper/Folia jar attached to this release
          NOTES

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          artifacts=(
            "lattice-api/build/libs/lattice-api-${VERSION}.jar"
            "lattice-api/build/libs/lattice-api-${VERSION}-sources.jar"
            "lattice-api/build/libs/lattice-api-${VERSION}-javadoc.jar"
            "lattice-core/build/libs/lattice-core-${VERSION}.jar"
            "lattice-core/build/libs/lattice-core-${VERSION}-sources.jar"
            "lattice-core/build/libs/lattice-core-${VERSION}-javadoc.jar"
            "lattice-paper/build/libs/lattice-paper-${VERSION}.jar"
            "lattice-paper/build/libs/lattice-paper-${VERSION}-sources.jar"
            "lattice-paper/build/libs/lattice-paper-${VERSION}-javadoc.jar"
            "lattice-paper/build/libs/lattice-paper-${VERSION}-standalone.jar"
          )

          release_flags=()
          if [[ "${PRERELEASE}" == "true" ]]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${artifacts[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG}" "${artifacts[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "Lattice ${VERSION}" \
              --notes-file build/release/notes.md \
              "${release_flags[@]}"
          fi

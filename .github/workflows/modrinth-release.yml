name: Modrinth Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without the leading v. Defaults to the Gradle property."
        required: false
      version_type:
        description: "Modrinth version type."
        required: true
        default: beta
        type: choice
        options:
          - beta
          - alpha
          - release

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Modrinth
    runs-on: ubuntu-latest
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
      MODRINTH_VERSION_TYPE: ${{ inputs.version_type || 'beta' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: false

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(grep '^latticeVersion=' gradle.properties | cut -d= -f2)"
          fi
          project_version="$(grep '^latticeVersion=' gradle.properties | cut -d= -f2)"
          if [[ "${project_version}" != "${version}" ]]; then
            echo "::error::Release version ${version} does not match gradle.properties (${project_version})."
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check Modrinth credentials
        shell: bash
        run: |
          if [[ -z "${MODRINTH_PROJECT_ID}" ]]; then
            echo "::error::Missing repository variable MODRINTH_PROJECT_ID."
            exit 1
          fi
          if [[ -z "${MODRINTH_TOKEN}" ]]; then
            echo "::error::Missing repository secret MODRINTH_TOKEN."
            exit 1
          fi

      - name: Check existing Modrinth version
        id: existing_version
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          exists="$(
            curl -fsSL "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}/version" \
              | python -c 'import json, os, sys; version = os.environ["VERSION"]; print("true" if any(item.get("version_number") == version for item in json.load(sys.stdin)) else "false")'
          )"
          echo "exists=${exists}" >> "${GITHUB_OUTPUT}"
          if [[ "${exists}" == "true" ]]; then
            echo "Modrinth version ${VERSION} already exists; skipping publish."
          fi

      - name: Build
        if: steps.existing_version.outputs.exists != 'true'
        run: ./gradlew --no-daemon -PlatticeVersion=${{ steps.release.outputs.version }} build

      - name: Check release notes
        if: steps.existing_version.outputs.exists != 'true'
        shell: bash
        run: |
          notes_file="docs/release-notes/${{ steps.release.outputs.version }}.md"
          if [[ ! -f "${notes_file}" ]]; then
            echo "::error::Missing release notes: ${notes_file}"
            exit 1
          fi

      - name: Publish
        if: steps.existing_version.outputs.exists != 'true'
        run: ./gradlew --no-daemon -PlatticeVersion=${{ steps.release.outputs.version }} :lattice-paper:modrinth

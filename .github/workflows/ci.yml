name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          validate-wrappers: false

      - name: Build
        run: ./gradlew --no-daemon build publishToMavenLocal :lattice-paper:standaloneJar

      - name: Upload standalone jar
        uses: actions/upload-artifact@v6
        with:
          name: lattice-paper-standalone
          path: lattice-paper/build/libs/*-standalone.jar
          if-no-files-found: error

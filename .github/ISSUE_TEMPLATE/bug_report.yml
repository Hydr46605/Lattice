name: Bug Report
description: Report a reproducible Lattice bug or regression.
title: "[Bug]: "
labels:
  - "type: bug"
  - "status: needs triage"
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What broke?
      placeholder: "Paper command registration fails when..."
    validations:
      required: true

  - type: dropdown
    id: artifact
    attributes:
      label: Artifact
      description: Which Lattice artifact is involved?
      options:
        - lattice-api
        - lattice-paper
        - lattice-core
        - standalone jar
        - documentation/example
        - unclear
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Pick the closest subsystem.
      multiple: true
      options:
        - lifecycle
        - modules
        - services
        - config
        - commands
        - text
        - tasks/scheduling
        - UI
        - storage
        - integrations
        - hooks/templates
        - diagnostics
        - Paper adapter
        - build/release
        - docs
    validations:
      required: true

  - type: input
    id: lattice-version
    attributes:
      label: Lattice Version
      placeholder: "0.8.1"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Server Platform
      description: Include Paper/Folia and server build.
      placeholder: "Paper 1.21.11 build ..."
    validations:
      required: false

  - type: input
    id: java-version
    attributes:
      label: Java Version
      placeholder: "Java 21"
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Provide the smallest sequence that reproduces the issue.
      placeholder: |
        1. Create a module with ...
        2. Register ...
        3. Start Paper ...
        4. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs Or Stack Trace
      description: Paste relevant logs, stack traces, or Gradle output.
      render: text
    validations:
      required: false

  - type: textarea
    id: code
    attributes:
      label: Minimal Code Or Config
      description: Add the smallest module/config/command/UI/storage snippet needed to understand the bug.
      render: java
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues first.
          required: true
        - label: I can reproduce this on the latest available Lattice release.
          required: true
        - label: This report is about Lattice itself, not a downstream plugin bug.
          required: true
